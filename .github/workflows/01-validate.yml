name: Validate
permissions:
  contents: read

on:
  push:
  workflow_dispatch:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: NPM Install
        run: npm ci

      - name: Run Lint Check
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run tests