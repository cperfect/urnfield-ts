name: Prepare Release
permissions:
  contents: write # commit the version bump and push the tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    name: Prepare
    # Manually dispatched only, and never on the main branch.
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          submodules: true
          # Full history + tags so the changelog covers commits since the last tag.
          fetch-depth: 0
          # A PAT lets the pushed tag trigger the release workflow; without one it
          # falls back to the default token, which bumps and pushes but cannot
          # trigger another workflow.
          token: ${{ secrets.RELEASE_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: NPM Install
        run: npm ci

      - name: Run Tests
        run: npm run tests

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # npm version bumps package.json, runs preversion (lint) and version
      # (regenerate + stage CHANGELOG.md), then commits and tags vX.Y.Z.
      - name: Bump version
        run: npm version ${{ inputs.bump }}

      - name: Push commit and tag
        run: git push --follow-tags
