name: Prepare Release
permissions:
  contents: write # commit and push the version bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version bump
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    name: Prepare
    # Manually dispatched only, and never on the main branch — prepare on a
    # branch, then open a PR into main. Tagging happens later, in Release.
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true
          # Full history + tags so the changelog covers commits since the last tag.
          fetch-depth: 0
          # Don't leave the git token in config during npm ci / lint / tests; the
          # push step below supplies it explicitly for just that step.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm

      - name: NPM Install
        run: npm ci

      - name: Run Lint Check
        run: npm run lint

      - name: Run Tests
        run: npm run tests

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump package.json and regenerate the changelog, but do NOT tag — the
      # Release workflow creates the tag on main. --ignore-scripts keeps the
      # version lifecycle from also running the changelog (avoiding a duplicate).
      - name: Bump version
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version --ignore-scripts
          npm run changelog
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): v$VERSION"

      - name: Push branch
        # Push explicitly to the dispatched branch with the token supplied only
        # here, so credentials are not persisted for npm ci / lint / tests.
        env:
          GH_TOKEN: ${{ github.token }}
        run: git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" "HEAD:${{ github.ref_name }}"
