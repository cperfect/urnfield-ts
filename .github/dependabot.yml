version: 2
updates:
  # npm dependencies (all dev-only for this package).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # The urnfield-spec conformance submodule.
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
