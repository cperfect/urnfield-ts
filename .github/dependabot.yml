version: 2
updates:
  # npm dependencies (all dev-only for this package).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
    # Bundle every npm update (including majors) into a single PR per run.
    groups:
      npm:
        patterns:
          - "*"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    # Bundle every GitHub Actions update (including majors) into a single PR.
    groups:
      github-actions:
        patterns:
          - "*"

  # The urnfield-spec conformance submodule.
  - package-ecosystem: gitsubmodule
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
      include: scope
